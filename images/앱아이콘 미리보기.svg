<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="55%" stop-color="#ffa1c0"/>
      <stop offset="100%" stop-color="#ffc94d"/>
    </linearGradient>
    <radialGradient id="petal" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#fff0f6"/>
      <stop offset="100%" stop-color="#ffd6e5"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- 반짝임 -->
  <circle cx="36" cy="40" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="160" cy="52" r="2" fill="#fff" opacity="0.85"/>
  <circle cx="28" cy="110" r="1.8" fill="#fff" opacity="0.8"/>
  <circle cx="166" cy="118" r="2.2" fill="#fff" opacity="0.85"/>

  <!-- 꽃잎 5장 -->
  <g transform="translate(96,70)">
    <ellipse cx="0" cy="-22" rx="12" ry="20" fill="url(#petal)" opacity="0.95"/>
    <ellipse cx="0" cy="-22" rx="12" ry="20" transform="rotate(72)" fill="url(#petal)" opacity="0.95"/>
    <ellipse cx="0" cy="-22" rx="12" ry="20" transform="rotate(144)" fill="url(#petal)" opacity="0.95"/>
    <ellipse cx="0" cy="-22" rx="12" ry="20" transform="rotate(216)" fill="url(#petal)" opacity="0.95"/>
    <ellipse cx="0" cy="-22" rx="12" ry="20" transform="rotate(288)" fill="url(#petal)" opacity="0.95"/>
    <!-- 중심 -->
    <circle cx="0" cy="0" r="9" fill="#ffd23f"/>
    <circle cx="0" cy="0" r="5" fill="#ff9f1c"/>
  </g>

  <!-- 텍스트 -->
  <text x="96" y="140" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="26" font-weight="800" fill="#ffffff" style="letter-spacing:2px;">축하</text>
  <text x="96" y="168" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="18" font-weight="700" fill="#ffffff" opacity="0.95" style="letter-spacing:1px;">알림</text>
</svg>
